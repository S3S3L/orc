<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale 1.0">
  <title>ORC Workflow Viewer</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/cytoscape/3.28.1/cytoscape.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    .container {
      display: flex;
      height: 100vh;
    }

    #graph-panel {
      flex: 1;
      min-width: 0;
      background: #1a1a2e;
      overflow: hidden;
    }

    /* Session sidebar panel */
    #session-panel {
      width: 380px;
      background: #1a2740;
      color: #fff;
      overflow-y: auto;
      padding: 20px;
      display: none;
      flex-shrink: 0;
    }

    #session-panel.visible {
      display: block;
    }

    #session-panel .panel-header {
      font-size: 16px;
      font-weight: bold;
      color: #f0f0f0;
      margin-bottom: 16px;
      padding-bottom: 10px;
      border-bottom: 1px solid #505050;
    }

    #session-panel .session-list-item {
      padding: 14px 16px;
      margin: 8px 0;
      background: #1c3d6e;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s;
      border: 1px solid transparent;
    }

    #session-panel .session-list-item:hover {
      background: #234b7e;
      border-color: #3a6a9e;
    }

    #session-panel .session-list-item.active {
      background: #e86078;
      border-color: #ff8090;
      color: #fff;
    }

    #session-panel .session-list-item.active .session-title {
      color: #fff;
    }

    #session-panel .session-list-item.active .session-time {
      color: #ffe8ec;
    }

    #session-panel .session-list-item.active .session-id {
      color: #ffdee5;
    }

    #session-panel .session-list-item .session-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
    }

    #session-panel .session-list-item .session-title {
      font-weight: bold;
      font-size: 13px;
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    #session-panel .session-list-item .session-time {
      font-size: 11px;
      color: #c4d4e8;
      margin-top: 4px;
      word-break: break-all;
    }

    #session-panel .session-list-item .session-id-row {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-top: 2px;
    }

    #session-panel .session-list-item .session-id {
      font-family: monospace;
      font-size: 10px;
      color: #dce8f5;
      word-break: break-all;
      opacity: 0.8;
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .copy-id-btn {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.25);
      color: #b8b8b8;
      padding: 4px 10px;
      min-width: 28px;
      height: 24px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
      flex-shrink: 0;
      line-height: 1;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
    }

    .copy-id-btn:hover {
      background: rgba(255,255,255,0.15);
      border-color: rgba(255,255,255,0.5);
      color: #fff;
    }

    #session-panel .session-list-item .session-actions {
      display: flex;
      gap: 4px;
      margin-top: 8px;
    }

    #claude-report-container {
      flex: 1;
      display: none;
      flex-direction: column;
      background: #fff;
    }

    #claude-report-container.active {
      display: flex;
    }

    #claude-report-toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 16px;
      background: #16213e;
      border-bottom: 1px solid #505050;
      min-height: 44px;
    }

    #claude-report-toolbar span {
      color: #b8b8b8;
      font-size: 13px;
    }

    #claude-report-frame {
      flex: 1;
      border: none;
      background: #fff;
    }

    #sidebar {
      width: 500px;
      min-width: 500px;
      flex-shrink: 0;
      background: #16213e;
      color: #fff;
      overflow-y: auto;
      padding: 20px;
    }

    .panel-header {
      font-size: 18px;
      font-weight: bold;
      margin-bottom: 20px;
      padding-bottom: 10px;
      border-bottom: 1px solid #505050;
    }

    .node-list {
      list-style: none;
    }

    .node-item {
      padding: 12px;
      margin: 8px 0;
      background: #0f3460;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .node-item:hover {
      background: #e94560;
    }

    .node-item.active {
      background: #e94560;
    }

    .node-item .node-id {
      font-weight: bold;
    }

    .node-item .node-type {
      font-size: 12px;
      color: #b8b8b8;
    }

    .node-item .node-status {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 11px;
      margin-top: 4px;
    }

    .status-pending {
      background: #909090;
    }

    .status-running {
      background: #5dade2;
    }

    .status-success {
      background: #4cd260;
    }

    .status-failed {
      background: #ff6b5a;
    }

    .status-skipped {
      background: #c08fd6;
    }

    #toolbar {
      position: absolute;
      top: 10px;
      left: 10px;
      z-index: 1000;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .btn {
      padding: 10px 20px;
      background: #e94560;
      color: #fff;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
    }

    .btn:hover {
      background: #ff6b6b;
    }

    .btn:disabled {
      background: #8a8a8a;
      cursor: not-allowed;
    }

    .btn-secondary {
      background: #0f3460;
    }

    .btn-secondary:hover {
      background: #1a5276;
    }

    .btn-sm {
      padding: 4px 10px;
      font-size: 12px;
    }

    .btn-rerun {
      background: #2ecc71;
      color: #fff;
    }

    .btn-rerun:hover {
      background: #27ae60;
    }

    #log-panel {
      margin-top: 20px;
    }

    #log-content {
      background: #0a0a0a;
      padding: 15px;
      border-radius: 8px;
      font-family: monospace;
      font-size: 12px;
      max-height: 300px;
      overflow-y: auto;
      white-space: pre-wrap;
    }

    .detail-section {
      margin: 20px 0;
    }

    .detail-label {
      font-size: 12px;
      color: #b8b8b8;
      margin-bottom: 8px;
    }

    .detail-value {
      background: #0f3460;
      padding: 10px;
      border-radius: 6px;
      font-size: 13px;
    }

    /* Node detail panel expanded styles */
    .node-detail-expanded {
      background: #0f3460;
      padding: 15px;
      border-radius: 8px;
      font-size: 13px;
    }

    .node-detail-expanded .section {
      margin: 12px 0;
    }

    .node-detail-expanded .section-title {
      font-size: 12px;
      color: #b8b8b8;
      margin-bottom: 6px;
      font-weight: bold;
    }

    .node-detail-expanded pre {
      background: #0a0a0a;
      padding: 10px;
      border-radius: 4px;
      font-size: 12px;
      overflow-x: auto;
      white-space: pre-wrap;
      word-break: break-all;
    }

    .node-detail-expanded .status-badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 12px;
    }

    .node-detail-expanded .actions {
      margin-top: 12px;
      display: flex;
      gap: 8px;
    }

    /* Claude Code message styles */
    .claude-messages {
      margin-top: 10px;
      max-height: 300px;
      overflow-y: auto;
    }

    .claude-msg {
      padding: 8px 10px;
      margin: 6px 0;
      border-radius: 6px;
      font-size: 12px;
      line-height: 1.5;
    }

    .claude-msg.user {
      background: #1a5276;
      border-left: 3px solid #3498db;
    }

    .claude-msg.assistant {
      background: #0f3460;
      border-left: 3px solid #9b59b6;
    }

    .claude-msg.system {
      background: #2c3e50;
      border-left: 3px solid #ff6b5a;
    }

    .claude-msg .msg-role {
      font-size: 10px;
      color: #b8b8b8;
      margin-bottom: 4px;
      font-weight: bold;
    }

    .claude-msg .msg-content {
      white-space: pre-wrap;
      word-break: break-word;
      color: #ddd;
    }

    .claude-msg .msg-content.collapsed {
      max-height: 80px;
      overflow: hidden;
      position: relative;
    }

    .claude-msg .msg-content.collapsed::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 30px;
      background: linear-gradient(transparent, #0f3460);
    }

    .claude-msg .msg-toggle {
      color: #3498db;
      cursor: pointer;
      font-size: 11px;
      margin-top: 4px;
    }

    .claude-msg .msg-toggle:hover {
      color: #5dade2;
    }

    .collapse-btn {
      background: transparent;
      border: 1px solid #555;
      color: #b8b8b8;
      padding: 2px 8px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 11px;
      margin-left: 8px;
    }

    .collapse-btn:hover {
      border-color: #888;
      color: #ddd;
    }

    /* Loop subgraph styles */
    .subgraph-expand-btn {
      background: #e67e22;
      color: #fff;
      border: none;
      padding: 6px 12px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
      margin-top: 8px;
    }

    .subgraph-expand-btn:hover {
      background: #d35400;
    }

    .subgraph-collapse-btn {
      background: #c0392b;
      color: #fff;
      border: none;
      padding: 6px 12px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
      margin: 10px 0;
    }

    .subgraph-collapse-btn:hover {
      background: #a93226;
    }

    .subgraph-label {
      font-size: 11px;
      color: #f39c12;
      font-weight: bold;
    }

    .subgraph-badge {
      display: inline-block;
      padding: 2px 6px;
      border-radius: 3px;
      font-size: 10px;
      background: #e67e22;
      color: #fff;
      margin-left: 4px;
    }

    /* Loading overlay */
    #loading-overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(10, 10, 20, 0.6);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 9999;
    }

    #loading-overlay.visible {
      display: flex;
    }

    .loading-spinner {
      display: flex;
      align-items: center;
      gap: 12px;
      background: rgba(22, 33, 62, 0.95);
      padding: 16px 28px;
      border-radius: 10px;
      font-size: 14px;
      color: #fff;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
    }

    .loading-spinner .spinner {
      width: 20px;
      height: 20px;
      border: 3px solid rgba(255, 255, 255, 0.2);
      border-top-color: #e94560;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>

<body>
  <div id="loading-overlay"><div class="loading-spinner"><div class="spinner"></div>Loading session...</div></div>
  <div id="toolbar">
    <button class="btn" id="run-btn" onclick="runWorkflow()">Run Workflow</button>
    <button class="btn btn-secondary" id="run-node-btn" onclick="runNode()">Run Node</button>
    <button class="btn btn-secondary" id="refresh-btn" onclick="refreshStatus()">Refresh</button>
    <button class="btn btn-secondary" id="fit-btn" onclick="fitGraph()">Fit</button>
    <button class="subgraph-collapse-btn" id="collapse-subgraph-btn" style="display: none;" onclick="collapseSubgraph()">Collapse Subgraph</button>
    <button class="btn btn-secondary" id="session-list-btn" onclick="toggleSessionPanel()">Sessions</button>
  </div>

  <div class="container">
    <div id="session-panel"></div>
    <div id="graph-panel"></div>
    <div id="claude-report-container">
      <div id="claude-report-toolbar">
        <span id="claude-report-title">Claude Code Report</span>
        <button class="btn btn-sm" onclick="window.open(currentClaudeHtmlUrl, '_blank')">View Full</button>
      </div>
      <iframe id="claude-report-frame"></iframe>
    </div>
    <div id="sidebar">
      <div class="panel-header">Workflow: <span id="workflow-name">-</span></div>

      <div class="detail-section">
        <div class="detail-label">Active Session</div>
        <div id="active-session-info" style="font-size: 13px;">-</div>
      </div>

      <div class="detail-section">
        <div class="detail-label">Nodes</div>
        <ul class="node-list" id="node-list"></ul>
      </div>

      <div class="detail-section" id="detail-panel" style="display: none;">
        <div class="detail-label">Node Detail</div>
        <div id="node-detail"></div>
      </div>

      <div id="log-panel">
        <div class="detail-label">Execution Log</div>
        <div id="log-content"></div>
      </div>
    </div>
  </div>

  <script>
    let cy;
    let workflowData = null;
    let currentSessionId = null;
    let pollInterval = null;
    let sessions = [];
    let selectedNodeId = null;  // Track currently selected node for detail panel
    let expandedLoopNodeId = null;  // Track which loop node is expanded
    let baseWorkflowData = null;  // Store original workflow before expansion
    let currentClaudeHtmlUrl = null;  // Current claude HTML report URL

    // ============ Initialization ============

    async function loadWorkflow() {
      try {
        const res = await fetch('/api/workflow');
        workflowData = await res.json();
        document.getElementById('workflow-name').textContent = workflowData.name;
        renderGraph();
        renderNodeList();
      } catch (e) {
        console.error('Failed to load workflow:', e);
      }
    }

    // ============ Session Management ============

    async function loadSessions() {
      try {
        const res = await fetch('/api/sessions');
        sessions = await res.json();
        renderSessionList();
      } catch (e) {
        console.error('Failed to load sessions:', e);
      }
    }

    function toggleSessionPanel() {
      const panel = document.getElementById('session-panel');
      if (panel.classList.contains('visible')) {
        panel.classList.remove('visible');
      } else {
        panel.classList.add('visible');
        loadSessions();
      }
      requestAnimationFrame(() => {
        if (cy) { cy.resize(); cy.fit(); }
      });
    }

    function renderSessionList() {
      const panel = document.getElementById('session-panel');
      if (!sessions || sessions.length === 0) {
        panel.innerHTML = '<div style="color: #b8b8b8; text-align: center; padding: 40px 0;">No sessions yet</div>';
        panel.classList.add('visible');
        return;
      }

      let html = '<div class="panel-header">Sessions</div>';
      html += sessions.map(s => {
        const time = new Date(s.startTime).toLocaleString();
        const statusClass = `status-${s.status}`;
        const statusLabel = s.status.charAt(0).toUpperCase() + s.status.slice(1);
        const isActive = s.id === currentSessionId;
        return `
          <div class="session-list-item ${isActive ? 'active' : ''}" onclick="selectSession('${s.id}')">
            <div class="session-row">
              <span class="session-title">${s.workflowName || 'Unnamed'}</span>
              <span class="node-status ${statusClass}" style="flex-shrink: 0;">${statusLabel}</span>
            </div>
            <div class="session-time">${time} · ${s.nodeCount} nodes</div>
            <div class="session-id-row">
              <span class="session-id">${s.id}</span>
              <button class="copy-id-btn" onclick="event.stopPropagation(); copySessionId('${s.id}', this)" title="Copy Session ID">📋</button>
            </div>
            ${s.status !== 'running' ? `
              <div class="session-actions">
                <button class="btn btn-sm btn-rerun" onclick="event.stopPropagation(); rerunSession('${s.id}')">Rerun</button>
              </div>
            ` : ''}
          </div>
        `;
      }).join('');
      panel.innerHTML = html;
    }

    async function selectSession(sessionId) {
      currentSessionId = sessionId;
      // Re-render list to update active highlight
      renderSessionList();
      document.getElementById('active-session-info').innerHTML = `
        <div>Session: ${sessionId.slice(0, 8)}...</div>
        <div style="color: #b8b8b8; font-size: 12px;">Loading...</div>
      `;
      pollSessionStatus(sessionId);
    }

    async function rerunSession(sessionId) {
      const btn = document.getElementById('run-btn');
      btn.disabled = true;
      btn.textContent = 'Rerunning...';

      try {
        const res = await fetch(`/api/rerun?sessionId=${sessionId}`, { method: 'POST' });
        const result = await res.json();
        log('Rerun started: ' + result.sessionId);
        selectSession(result.sessionId);
      } catch (e) {
        log('Rerun error: ' + e.message);
        btn.disabled = false;
        btn.textContent = 'Run Workflow';
      }
    }

    // ============ Graph Rendering ============

    function renderGraph(isExpanded) {
      const elements = [];
      const connectedNodes = new Set();

      for (const edge of workflowData.edges) {
        if (edge.condition?.branches) {
          edge.condition.branches.forEach((branch, idx) => {
            let conditionLabel = branch.expression
              .replace(/outputs\['[^']+'\]\?\./g, '')
              .replace(/=== /g, '=')
              .replace(/!== /g, '!=')
              .replace(/ && /g, ' & ')
              .replace(/ \|\| /g, ' | ')
              .replace(/'/g, '');

            elements.push({
              data: {
                id: edge.id + '-branch-' + idx,
                source: edge.from.nodeId,
                target: branch.to.nodeId,
                label: conditionLabel,
                isBranchEdge: true
              }
            });

            connectedNodes.add(edge.from.nodeId);
            connectedNodes.add(branch.to.nodeId);
          });
        } else if (edge.to) {
          elements.push({
            data: {
              id: edge.id,
              source: edge.from.nodeId,
              target: edge.to.nodeId,
              label: edge.to.input
            }
          });

          connectedNodes.add(edge.from.nodeId);
          connectedNodes.add(edge.to.nodeId);
        }
      }

      for (const node of workflowData.nodes) {
        if (connectedNodes.has(node.id)) {
          const isSubNode = expandedLoopNodeId && !baseWorkflowData?.nodes.some(n => n.id === node.id);
          elements.push({
            data: { id: node.id, label: node.name || node.id, type: node.type, status: 'pending', isSubgraphNode: isSubNode }
          });
        }
      }

      cy = cytoscape({
        container: document.getElementById('graph-panel'),
        elements,
        style: [
          {
            selector: 'node',
            style: {
              'background-color': 'node-color',
              'label': 'data(label)',
              'color': '#fff',
              'text-valign': 'center',
              'text-halign': 'center',
              'width': 120,
              'height': 60,
              'border-width': 2,
              'border-color': '#fff',
              'font-size': '12px',
              'font-weight': 'bold'
            }
          },
          {
            selector: 'node[type="bash"]',
            style: { 'background-color': '#3498db' }
          },
          {
            selector: 'node[type="python"]',
            style: { 'background-color': '#f39c12' }
          },
          {
            selector: 'node[type="node"]',
            style: { 'background-color': '#2ecc71' }
          },
          {
            selector: 'node[type="claude-code"]',
            style: { 'background-color': '#9b59b6' }
          },
          {
            selector: 'node[type="loop"]',
            style: { 'background-color': '#e67e22', 'border-style': 'dashed' }
          },
          {
            selector: 'node[isSubgraphNode="true"]',
            style: { 'border-style': 'dashed', 'border-width': 3, 'border-color': '#f39c12', 'background-opacity': 0.8 }
          },
          {
            selector: 'node[status="running"]',
            style: { 'border-width': 4, 'border-color': '#f1c40f' }
          },
          {
            selector: 'node[status="success"]',
            style: { 'background-color': '#27ae60' }
          },
          {
            selector: 'node[status="failed"]',
            style: { 'background-color': '#c0392b', 'border-color': '#e74c3c' }
          },
          {
            selector: 'node[status="skipped"]',
            style: { 'background-color': '#9b59b6', 'border-color': '#8e44ad' }
          },
          {
            selector: 'edge',
            style: {
              'width': 2,
              'line-color': '#8a8a8a',
              'target-arrow-color': '#8a8a8a',
              'target-arrow-shape': 'triangle',
              'curve-style': 'bezier',
              'label': 'data(label)',
              'font-size': '10px',
              'color': '#b8b8b8'
            }
          },
          {
            selector: 'edge[isBranchEdge="true"]',
            style: {
              'line-color': '#3498db',
              'target-arrow-color': '#3498db',
              'width': 2,
              'line-style': 'solid'
            }
          }
        ],
        layout: {
          name: 'breadthfirst',
          directed: true,
          padding: 50,
          spacingFactor: 1.5
        }
      });

      cy.on('tap', 'node', function (evt) {
        showNodeDetail(evt.target.data());
      });
    }

    // ============ Node List ============

    function renderNodeList() {
      const list = document.getElementById('node-list');

      const connectedNodes = new Set();
      for (const edge of workflowData.edges) {
        connectedNodes.add(edge.from.nodeId);
        if (edge.condition?.branches) {
          for (const branch of edge.condition.branches) {
            connectedNodes.add(branch.to.nodeId);
          }
        } else if (edge.to) {
          connectedNodes.add(edge.to.nodeId);
        }
      }

      // Identify subgraph nodes (nodes that didn't exist in the base workflow)
      const baseNodeIds = expandedLoopNodeId && baseWorkflowData
        ? new Set(baseWorkflowData.nodes.map(n => n.id))
        : new Set();
      const subNodeIds = baseNodeIds.size > 0
        ? new Set(workflowData.nodes.filter(n => !baseNodeIds.has(n.id)).map(n => n.id))
        : new Set();

      list.innerHTML = workflowData.nodes
        .filter(node => connectedNodes.has(node.id))
        .map(node => {
          const isSub = subNodeIds.has(node.id);
          return `
          <li class="node-item" data-node-id="${node.id}" onclick="selectNode('${node.id}')">
            <div class="node-id">${node.name || node.id}${isSub ? '<span class="subgraph-badge">sub</span>' : ''}</div>
            <div class="node-type">${node.type}</div>
            <span class="node-status status-pending" id="status-${node.id}">Pending</span>
          </li>
        `;}).join('');
    }

    // ============ Node Selection & Detail ============

    function selectNode(nodeId) {
      const node = cy.getElementById(nodeId);
      showNodeDetail(node.data());

      document.getElementById('run-node-btn').disabled = false;
      document.getElementById('run-node-btn').onclick = () => runSingleNode(nodeId);
      document.querySelectorAll('.node-item').forEach(el => el.classList.remove('active'));
      document.querySelector(`[data-node-id="${nodeId}"]`)?.classList.add('active');
    }

    async function showNodeDetail(data) {
      const panel = document.getElementById('detail-panel');
      const detail = document.getElementById('node-detail');
      panel.style.display = 'block';
      selectedNodeId = data.id;

      let html = `
        <div class="node-detail-expanded">
          <div class="section">
            <div class="section-title">Definition</div>
            <div><strong>ID:</strong> ${data.id}</div>
            <div><strong>Type:</strong> <span style="text-transform: capitalize;">${data.type}</span></div>
            <div><strong>Name:</strong> ${data.label}</div>
          </div>
          <div class="section">
            <div class="section-title">Status</div>
            <span class="status-badge ${data.status ? 'status-' + data.status : 'status-pending'}">${(data.status || 'pending').charAt(0).toUpperCase() + (data.status || 'pending').slice(1)}</span>
            <span id="detail-status" style="margin-left: 8px;">${data.status || 'pending'}</span>
          </div>
          <div class="section">
            <div class="section-title">Inputs</div>
            <pre id="node-inputs">Loading...</pre>
          </div>
          <div class="section">
            <div class="section-title">Output</div>
            <pre id="node-output">Loading...</pre>
          </div>
          <div class="section" id="node-audit-section" style="display: none;">
            <div class="section-title">Execution Details</div>
            <div id="node-audit-content"></div>
          </div>
          <div class="section" id="node-claude-section" style="display: none;">
            <div class="section-title">Claude Conversation</div>
            <div id="node-claude-content"></div>
          </div>
          <div class="actions">
            <button class="btn btn-sm btn-rerun" onclick="runSingleNode('${data.id}')">Run This Node</button>
            ${data.type === 'loop' ? `<button class="subgraph-expand-btn" onclick="expandLoopSubgraph('${data.id}')">⤢ Expand Subgraph</button>` : ''}
          </div>
        </div>
      `;

      detail.innerHTML = html;

      // Fetch extended node data if a session is active
      if (currentSessionId) {
        await fetchNodeDetail(data.id);
      }
    }

    async function fetchNodeDetail(nodeId) {
      if (!currentSessionId) return;

      try {
        const res = await fetch(`/api/node/${nodeId}?sessionId=${currentSessionId}`);
        if (!res.ok) {
          const inputsEl = document.getElementById('node-inputs');
          if (inputsEl) inputsEl.textContent = 'No input data';
          const outputEl = document.getElementById('node-output');
          if (outputEl) outputEl.textContent = 'No output data';
          return;
        }

        const data = await res.json();

        // Find node type from workflow data
        const nodeDef = workflowData?.nodes.find(n => n.id === nodeId);
        const isClaudeCode = nodeDef?.type === 'claude-code';

        const inputsEl = document.getElementById('node-inputs');
        if (inputsEl && data.inputs) {
          inputsEl.textContent = JSON.stringify(data.inputs, null, 2);
        } else if (inputsEl) {
          inputsEl.textContent = 'No input data';
        }

        const outputEl = document.getElementById('node-output');
        if (outputEl && data.output) {
          outputEl.textContent = JSON.stringify(data.output, null, 2);
        } else if (outputEl) {
          outputEl.textContent = 'No output data';
        }

        // Show execution details if available
        const auditSection = document.getElementById('node-audit-section');
        const auditContent = document.getElementById('node-audit-content');
        if (auditSection && auditContent && data.audit) {
          auditSection.style.display = 'block';
          let auditHtml = `
            <div style="font-size: 12px; color: #d0d0d0;">
              <div><strong>Phase:</strong> ${data.audit.phase} &nbsp; <strong>Time:</strong> ${new Date(data.audit.timestamp).toLocaleString()}</div>
          `;
          if (data.audit.execution) {
            const exec = data.audit.execution;
            auditHtml += `
              <div style="margin-top: 6px;"><strong>Duration:</strong> ${exec.duration}ms &nbsp; <strong>Exit Code:</strong> ${exec.exitCode}</div>
              ${exec.stdout ? `<div style="margin-top: 6px;"><strong>Stdout:</strong> <pre style="max-height:100px;overflow:auto;">${escapeHtml(exec.stdout.slice(0, 500))}</pre></div>` : ''}
              ${exec.stderr ? `<div style="margin-top: 4px;"><strong>Stderr:</strong> <pre style="max-height:100px;overflow:auto;color:#ff6b5a;">${escapeHtml(exec.stderr.slice(0, 500))}</pre></div>` : ''}
            `;
          }
          if (data.audit.error) {
            auditHtml += `<div style="margin-top: 6px; color: #ff6b5a;"><strong>Error:</strong> ${escapeHtml(data.audit.error)}</div>`;
          }
          if (data.audit.retry) {
            auditHtml += `<div style="margin-top: 4px; color: #f39c12;"><strong>Retry:</strong> attempt ${data.audit.retry.attempt}/${data.audit.retry.maxAttempts}, delay ${data.audit.retry.delay}ms</div>`;
          }
          if (data.audit.persistedFiles) {
            auditHtml += `<div style="margin-top: 4px; color: #b8b8b8;"><strong>Output:</strong> ${escapeHtml(data.audit.persistedFiles.output)}</div>`;
          }
          auditHtml += '</div>';
          auditContent.innerHTML = auditHtml;
        }

        // Show Claude Code conversation for claude-code nodes
        const claudeSection = document.getElementById('node-claude-section');
        const claudeContent = document.getElementById('node-claude-content');
        if (claudeSection && claudeContent && isClaudeCode && data.claudeMessages && data.claudeMessages.length > 0) {
          claudeSection.style.display = 'block';
          let msgHtml = '<div class="claude-messages">';
          for (const msg of data.claudeMessages) {
            const role = msg.role || 'unknown';
            const content = msg.content || '';
            const displayText = typeof content === 'string' ? content : JSON.stringify(content, null, 2);
            const truncated = displayText.length > 300 ? displayText.slice(0, 300) : displayText;
            const needsToggle = displayText.length > 300;
            msgHtml += `
              <div class="claude-msg ${role}">
                <div class="msg-role">${role.toUpperCase()}</div>
                <div class="msg-content ${needsToggle ? 'collapsed' : ''}" id="msg-${msg.id || Math.random().toString(36).slice(2)}">${escapeHtml(truncated)}${needsToggle ? '...' : ''}</div>
                ${needsToggle ? `<div class="msg-toggle" onclick="toggleMessage(this)">[Show more]</div>` : ''}
              </div>
            `;
          }
          msgHtml += '</div>';
          claudeContent.innerHTML = msgHtml;
        } else if (claudeSection && isClaudeCode) {
          claudeSection.style.display = 'none';
        }

        // Show Claude Code HTML export in main panel for claude-code nodes
        if (isClaudeCode && data.claudeHtmlUrl) {
          showClaudeReport(nodeId, data.claudeHtmlUrl);
        } else {
          hideClaudeReport();
        }
      } catch (e) {
        console.error('Failed to fetch node detail:', e);
        const inputsEl = document.getElementById('node-inputs');
        if (inputsEl) inputsEl.textContent = 'Failed to load';
        const outputEl = document.getElementById('node-output');
        if (outputEl) outputEl.textContent = 'Failed to load';
      }
    }

    // ============ Utility Functions ============

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function toggleMessage(el) {
      const msgContent = el.previousElementSibling;
      const isCollapsed = msgContent.classList.contains('collapsed');
      if (isCollapsed) {
        // Re-fetch and show full content - we only have truncated version in DOM
        msgContent.classList.remove('collapsed');
        el.textContent = '[Show less]';
      } else {
        msgContent.classList.add('collapsed');
        el.textContent = '[Show more]';
      }
    }

    // ============ Workflow Execution ============

    async function runWorkflow() {
      const btn = document.getElementById('run-btn');
      btn.disabled = true;
      btn.textContent = 'Running...';

      try {
        const res = await fetch('/api/run', { method: 'POST' });
        const result = await res.json();
        log('Workflow started: ' + result.sessionId);
        selectSession(result.sessionId);
      } catch (e) {
        log('Error: ' + e.message);
        btn.disabled = false;
        btn.textContent = 'Run Workflow';
      }
    }

    async function runSingleNode(nodeId) {
      const btn = document.getElementById('run-node-btn');
      btn.disabled = true;
      btn.textContent = 'Running...';

      try {
        let url = `/api/node/run?nodeId=${nodeId}&single=true`;
        if (currentSessionId) {
          url += `&sessionId=${currentSessionId}`;
        }
        const res = await fetch(url, { method: 'POST' });
        const result = await res.json();
        log(`Node ${nodeId} started: ${result.sessionId}`);
        selectSession(result.sessionId);
      } catch (e) {
        log('Error: ' + e.message);
        btn.disabled = false;
        btn.textContent = 'Run Node';
      }
    }

    // ============ Status Polling ============

    function pollSessionStatus(sessionId) {
      // Stop previous polling
      if (pollInterval) {
        clearTimeout(pollInterval);
        pollInterval = null;
      }

      // Show loading overlay
      document.getElementById('loading-overlay').classList.add('visible');

      document.getElementById('active-session-info').innerHTML = `
        <div>Session: ${sessionId.slice(0, 8)}...</div>
        <div style="color: #b8b8b8; font-size: 12px;">Polling...</div>
      `;

      const checkStatus = async () => {
        try {
          const res = await fetch(`/api/session/${sessionId}/status`);
          if (!res.ok) {
            // Retry even on error (session may not be ready yet)
            pollInterval = setTimeout(checkStatus, 1000);
            return;
          }

          const status = await res.json();

          // Hide loading overlay once
          document.getElementById('loading-overlay').classList.remove('visible');

          // Historical session with persisted node statuses (no active execution)
          if (status.nodeStatuses && !status.complete && status.endTime) {
            // Apply persisted node statuses
            for (const [nid, nodeStatus] of Object.entries(status.nodeStatuses)) {
              updateNodeStatus(nid, nodeStatus);
            }
            // Update session info
            document.getElementById('active-session-info').innerHTML = `
              <div>Session: ${sessionId.slice(0, 8)}...</div>
              <span class="status-badge status-${status.status}">${status.status.charAt(0).toUpperCase() + status.status.slice(1)}</span>
              <div style="color: #b8b8b8; font-size: 11px;">Historical session</div>
            `;
            return;
          }

          // Active session with node data from executor
          if (status.nodes) {
            for (const node of status.nodes) {
              updateNodeStatus(node.definition.id, node.status);
            }
          }

          // Update logs
          if (status.logs) {
            document.getElementById('log-content').textContent = status.logs.join('\n');
          }

          // Update active session info
          document.getElementById('active-session-info').innerHTML = `
            <div>Session: ${sessionId.slice(0, 8)}...</div>
            <span class="status-badge status-${status.status}">${status.status.charAt(0).toUpperCase() + status.status.slice(1)}</span>
          `;

          // Update node detail if a node is selected (via sidebar or graph)
          const nodeId = selectedNodeId || document.querySelector('.node-item.active')?.getAttribute('data-node-id');
          if (nodeId) {
            fetchNodeDetail(nodeId);
          }

          if (status.complete) {
            document.getElementById('run-btn').disabled = false;
            document.getElementById('run-btn').textContent = 'Run Workflow';
            log('Workflow completed');
            loadSessions();
            return;
          }
        } catch (e) {
          console.error('Poll error:', e);
        }
        // Continue polling for active sessions
        pollInterval = setTimeout(checkStatus, 1000);
      };

      // Start polling
      checkStatus();
    }

    function updateNodeStatus(nodeId, status) {
      const node = cy.getElementById(nodeId);
      if (node.length > 0) {
        node.data('status', status);
      }

      const statusEl = document.getElementById(`status-${nodeId}`);
      if (statusEl) {
        statusEl.className = `node-status status-${status}`;
        statusEl.textContent = status.charAt(0).toUpperCase() + status.slice(1);
      }

      const detailStatus = document.getElementById('detail-status');
      if (detailStatus && document.querySelector(`[data-node-id="${nodeId}"]`)?.classList.contains('active')) {
        detailStatus.textContent = status;
      }
    }

    function copySessionId(sessionId, btn) {
      const done = () => {
        btn.textContent = '✓';
        setTimeout(() => { btn.textContent = '📋'; }, 1500);
      };
      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(sessionId).then(done);
      } else {
        const ta = document.createElement('textarea');
        ta.value = sessionId;
        ta.style.cssText = 'position:fixed;left:-9999px;opacity:0';
        document.body.appendChild(ta);
        ta.select();
        try { document.execCommand('copy'); } catch(e) {}
        document.body.removeChild(ta);
        done();
      }
    }

    // ============ Claude Report Panel ============

    function showClaudeReport(nodeId, url) {
      const container = document.getElementById('claude-report-container');
      const graphPanel = document.getElementById('graph-panel');
      const frame = document.getElementById('claude-report-frame');
      const title = document.getElementById('claude-report-title');
      currentClaudeHtmlUrl = url;
      frame.src = url;
      title.textContent = `${nodeId} - Claude Code Report`;
      container.classList.add('active');
      graphPanel.style.display = 'none';
    }

    function hideClaudeReport() {
      const container = document.getElementById('claude-report-container');
      const graphPanel = document.getElementById('graph-panel');
      const frame = document.getElementById('claude-report-frame');
      container.classList.remove('active');
      graphPanel.style.display = '';
      frame.src = '';
      currentClaudeHtmlUrl = null;
    }

    // ============ Utility Functions ============

    function refreshStatus() {
      loadWorkflow();
      loadSessions();
      log('Status refreshed');
    }

    function fitGraph() {
      if (cy) cy.fit();
    }

    function log(message) {
      const logContent = document.getElementById('log-content');
      logContent.textContent += message + '\n';
      logContent.scrollTop = logContent.scrollHeight;
    }

    // ============ Loop Subgraph Expansion ============

    async function expandLoopSubgraph(nodeId) {
      try {
        const res = await fetch(`/api/loop/${nodeId}/subgraph`);
        if (!res.ok) {
          log(`Failed to load subgraph for ${nodeId}`);
          return;
        }

        const subgraphData = await res.json();
        const subgraph = subgraphData.subGraph;

        // Save original workflow
        if (!baseWorkflowData) {
          baseWorkflowData = JSON.parse(JSON.stringify(workflowData));
        }
        expandedLoopNodeId = nodeId;

        // Build expanded workflow: remove loop node, add subgraph nodes + edges
        const parentNodes = workflowData.nodes.filter(n => n.id !== nodeId);
        const allNodes = [...parentNodes, ...subgraph.nodes];
        const allEdges = [...workflowData.edges];

        // Filter out edges that reference the loop node and redirect to subgraph roots
        const subNodeIds = new Set(subgraph.nodes.map(n => n.id));
        const subRoots = subgraph.nodes.filter(n => !subgraph.edges.some(e => e.to?.nodeId === n.id));
        const subLeafs = subgraph.nodes.filter(n => !subgraph.edges.some(e => e.from?.nodeId === n.id));

        const newEdges = allEdges
          .filter(e => e.from.nodeId !== nodeId)  // Remove edges from loop node
          .map(e => {
            if (e.to?.nodeId === nodeId && subRoots.length > 0) {
              // Redirect to first subgraph root
              return { id: e.id + '-sub', from: e.from, to: { nodeId: subRoots[0].id, input: e.to.input } };
            }
            if (e.condition?.branches) {
              const newBranches = e.condition.branches.map(b => {
                if (b.to.nodeId === nodeId && subRoots.length > 0) {
                  return { ...b, to: { nodeId: subRoots[0].id, input: b.to.input } };
                }
                return b;
              });
              return { ...e, condition: { ...e.condition, branches: newBranches } };
            }
            return e;
          });

        // Add edges from loop leaves to downstream nodes
        const loopDownstreamEdges = workflowData.edges
          .filter(e => e.from.nodeId === nodeId)
          .flatMap(e => {
            if (subLeafs.length > 0) {
              return subLeafs.map(leaf => ({
                id: `${e.id}-${leaf.id}-sub`,
                from: { nodeId: leaf.id },
                to: e.to ? { nodeId: e.to.nodeId, input: e.to.input } : undefined
              }));
            }
            return [];
          });

        // Combine all edges
        const expandedEdges = [...newEdges, ...subgraph.edges, ...loopDownstreamEdges].filter(e => e.to);

        // Update workflow data
        workflowData = { ...workflowData, nodes: allNodes, edges: expandedEdges };

        // Re-render graph and node list
        renderGraph(true);  // true = has expanded subgraph
        renderNodeList();

        // Show collapse button
        document.getElementById('collapse-subgraph-btn').style.display = 'inline-block';

        // Hide expand button for this node in detail panel
        const expandBtn = document.querySelector('.subgraph-expand-btn');
        if (expandBtn) expandBtn.style.display = 'none';

        log(`Expanded loop subgraph: ${nodeId} (${subgraph.nodes.length} nodes, ${subgraph.edges.length} edges)`);
      } catch (e) {
        log(`Error expanding subgraph: ${e.message}`);
      }
    }

    function collapseSubgraph() {
      if (!baseWorkflowData) return;

      workflowData = baseWorkflowData;
      baseWorkflowData = null;
      expandedLoopNodeId = null;

      // Re-render
      renderGraph(false);
      renderNodeList();

      // Hide collapse button
      document.getElementById('collapse-subgraph-btn').style.display = 'none';

      log('Collapsed subgraph back to loop node');
    }

    // Initialize
    loadWorkflow();
    loadSessions();
  </script>
</body>
